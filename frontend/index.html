<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeBlanc</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────── */
:root {
  --bg:      #F6F4F0;
  --surface: #FDFCFA;
  --rule:    #E2DDD6;
  --rule-2:  #CBC4BB;
  --ink:     #1A1612;
  --ink-2:   #6E675E;
  --ink-3:   #B0A89F;
  --ink-4:   #D8D2CB;

  /* the one accent */
  --terra:     oklch(48% 0.11 34);
  --terra-mid: oklch(58% 0.10 34);
  --terra-pale: oklch(95% 0.03 34);

  /* semantic — muted, not garish */
  --ok:    oklch(46% 0.12 152);
  --warn:  oklch(54% 0.12 68);
  --bad:   oklch(50% 0.14 20);

  --mono: 'JetBrains Mono', monospace;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ─────────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 56px;
  height: 58px;
}

.brand {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: -0.3px;
  flex-shrink: 0;
}

.nav-rule { flex: 1; height: 1px; background: var(--rule); margin: 0 40px; }

.nav-links { display: flex; gap: 0; }
.nav-a {
  font-size: 12.5px;
  font-weight: 500;
  letter-spacing: 0.3px;
  color: var(--ink-3);
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 4px;
  transition: color 0.15s;
  position: relative;
}
.nav-a:hover { color: var(--ink-2); }
.nav-a.on {
  color: var(--terra);
}
.nav-a.on::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 16px; right: 16px;
  height: 1px;
  background: var(--terra);
}

/* ─────────────────────────────────────────────
   PAGE WRAPPER
───────────────────────────────────────────── */
.page { max-width: 1320px; margin: 0 auto; padding: 48px 56px; }

/* ─────────────────────────────────────────────
   CONFIGURE SECTION
───────────────────────────────────────────── */
.configure { margin-bottom: 48px; }

.config-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.config-row-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-3);
  min-width: 72px;
}

/* text-only category toggles */
.cat-btn {
  background: none;
  border: none;
  font-family: var(--sans);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink-3);
  cursor: pointer;
  padding: 4px 0;
  margin: 0 10px 0 0;
  border-bottom: 1.5px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.cat-btn:hover { color: var(--ink-2); }
.cat-btn.active { color: var(--ink); border-bottom-color: var(--terra); }

/* model toggles */
.model-btn {
  background: none;
  border: 1px solid var(--rule-2);
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  padding: 5px 14px;
  border-radius: 100px;
  transition: all 0.15s;
}
.model-btn:hover { border-color: var(--ink-3); color: var(--ink); }
.model-btn.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--surface);
}

/* prompt line */
.prompt-line {
  display: flex;
  align-items: stretch;
  gap: 0;
  border: 1px solid var(--rule-2);
  border-radius: 6px;
  background: var(--surface);
  overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.prompt-line:focus-within {
  border-color: var(--ink-2);
  box-shadow: 0 0 0 3px rgba(26,22,18,0.06);
}
.prompt-select-inline {
  background: var(--bg);
  border: none;
  border-right: 1px solid var(--rule);
  color: var(--ink-2);
  padding: 12px 14px;
  font-size: 13px;
  font-family: var(--sans);
  outline: none;
  min-width: 180px;
  cursor: pointer;
}
.prompt-input-inline {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--ink);
  padding: 12px 16px;
  font-size: 14px;
  font-family: var(--sans);
  outline: none;
}
.prompt-input-inline::placeholder { color: var(--ink-4); }

.btn-analyze {
  background: var(--ink);
  color: var(--surface);
  border: none;
  padding: 0 24px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.2px;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-analyze:hover:not(:disabled) { background: #2e2a26; }
.btn-analyze:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-batch {
  background: none;
  border-left: 1px solid var(--rule);
  color: var(--ink-2);
  padding: 0 18px;
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, background 0.15s;
}
.btn-batch:hover:not(:disabled) { background: var(--bg); color: var(--ink); }
.btn-batch:disabled { opacity: 0.35; cursor: not-allowed; }

/* ─────────────────────────────────────────────
   STATUS / PROGRESS
───────────────────────────────────────────── */
.status-line {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; margin-bottom: 24px;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.spin {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 1.5px solid var(--rule-2);
  border-top-color: var(--terra);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-txt { font-size: 13px; color: var(--ink-2); }

.progress-wrap { margin-bottom: 28px; }
.progress-meta { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12.5px; color: var(--ink-2); }
.progress-track { height: 2px; background: var(--rule); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--terra); border-radius: 99px; transition: width 0.3s; }

.err-line { padding: 10px 0; color: var(--bad); font-size: 13px; border-bottom: 1px solid oklch(86% 0.06 20); margin-bottom: 20px; }

/* ─────────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────────── */
.empty {
  padding: 80px 0 60px;
  border-top: 1px solid var(--rule);
}
.empty-word {
  font-family: var(--serif);
  font-style: italic;
  font-size: 52px;
  color: var(--ink-4);
  display: block;
  margin-bottom: 12px;
  letter-spacing: -1px;
}
.empty-sub { font-size: 14px; color: var(--ink-3); max-width: 340px; line-height: 1.6; }

/* ─────────────────────────────────────────────
   RESULTS
───────────────────────────────────────────── */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  border-radius: 8px;
  overflow: hidden;
}

.mcard { background: var(--surface); display: flex; flex-direction: column; }

/* card header */
.mcard-head {
  padding: 20px 24px 16px;
  display: flex; align-items: flex-start; justify-content: space-between;
  border-bottom: 1px solid var(--rule);
}
.mcard-name {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.2px;
}
.mcard-status { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sd-ok   { background: var(--ok); }
.sd-warn { background: var(--warn); }
.sd-bad  { background: var(--bad); }
.sd-nil  { background: var(--ink-4); }
.status-label { font-size: 12px; color: var(--ink-2); }

/* mode tabs — minimal underline style */
.mtabs {
  display: flex;
  padding: 0 24px;
  border-bottom: 1px solid var(--rule);
  gap: 20px;
}
.mtab {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-3);
  padding: 10px 0;
  cursor: pointer;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
}
.mtab:hover { color: var(--ink-2); }
.mtab.on { color: var(--ink); border-bottom-color: var(--terra); }

.mbody { padding: 20px 24px; flex: 1; }

/* vuln list */
.vlist { margin-bottom: 20px; }
.vitem {
  padding: 11px 0;
  border-bottom: 1px solid var(--rule);
}
.vitem:first-child { border-top: 1px solid var(--rule); }
.vrow { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
.vcwe { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--bad); letter-spacing: 0.2px; }
.vcat { font-size: 11px; color: var(--ink-3); }
.vmsg { font-size: 13px; color: var(--ink-2); line-height: 1.5; }

.clean-line { font-size: 13px; color: var(--ok); padding: 10px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

/* repair */
.repair-section { margin-bottom: 20px; }
.repair-heading { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 12px; }
.repair-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; color: var(--ink-2); border-bottom: 1px dashed var(--rule); }
.repair-row:first-of-type { border-top: 1px dashed var(--rule); }
.pass-label { font-size: 11px; font-family: var(--mono); color: var(--ink-3); min-width: 48px; }
.pass-arrow { color: var(--ink-4); margin: 0 4px; }
.pass-clean .pass-arrow { color: var(--ok); }
.repair-verdict {
  margin-top: 10px;
  font-size: 12.5px;
  font-weight: 500;
}
.rv-ok   { color: var(--ok); }
.rv-warn { color: var(--warn); }

/* code */
.code-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.code-lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink-3); }
.code-block {
  background: #16130F;
  border-radius: 5px;
  padding: 16px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
  color: #CCC5BC;
  overflow-x: auto;
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}
.code-block::-webkit-scrollbar { width: 3px; height: 3px; }
.code-block::-webkit-scrollbar-thumb { background: #38322C; border-radius: 99px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const API = "/api";

const CATS = ["All", "Top 40 (Hard)", "Injection", "Credential Management", "Access Control", "Information Exposure", "File Handling", "Deserialization", "Path Traversal"];
const MODELS = ["llama3.3-70b","llama3.1-8b","gemini-2.5-flash","gemini-2.5-pro","command-a"];

function StatusDot({ count, failed }) {
  if (failed)    return [<span key="d" className="status-dot sd-nil"/>, <span key="l" className="status-label">parse error</span>];
  if (count===0) return [<span key="d" className="status-dot sd-ok"/>,  <span key="l" className="status-label">clean</span>];
  if (count<=2)  return [<span key="d" className="status-dot sd-warn"/>,<span key="l" className="status-label">{count} issue{count>1?"s":""}</span>];
  return           [<span key="d" className="status-dot sd-bad"/>, <span key="l" className="status-label">{count} issues</span>];
}

function App() {
  const [prompt, setPrompt]   = useState("");
  const [promptId, setPromptId] = useState("custom");
  const [demos, setDemos]     = useState([]);
  const [cat, setCat]         = useState("All");
  const [models, setModels]   = useState(["llama3.1-8b","gemini-2.5-flash","command-a"]);
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [batching, setBatch]  = useState(false);
  const [bp, setBp]           = useState({c:0,t:0});
  const [status, setStatus]   = useState("");
  const [err, setErr]         = useState("");
  const [tabs, setTabs]       = useState({});

  useEffect(()=>{ fetch(`${API}/prompts`).then(r=>r.json()).then(setDemos).catch(()=>{}); },[]);

  const filtered = useMemo(()=>{
    if (cat === "Top 40 (Hard)") return demos.filter(p => String(p.copilot_vulnerable).toUpperCase() === "TRUE").slice(0, 40);
    if (cat === "All") return demos;
    return demos.filter(p=>p.category===cat);
  },[demos,cat]);

  const toggle = m => setModels(p=>p.includes(m)?p.filter(x=>x!==m):[...p,m]);

  const run = async (pt,pi) => {
    const tp=pt||prompt, ti=pi||promptId;
    if (!tp.trim()||!models.length) return;
    setResults(null); setErr("");
    const t={}; models.forEach(m=>t[m]="enriched_repair"); setTabs(t);
    const steps=["Dispatching to models…","Running Semgrep & Bandit…","Iterative repair loop…","Finalising…"];
    let si=0; setStatus(steps[0]);
    const iv=setInterval(()=>{ si=(si+1)%steps.length; setStatus(steps[si]); },1400);
    setLoading(true);
    try {
      const res=await fetch(`${API}/compare`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:tp.trim(),prompt_id:ti,models})});
      const text=await res.text();
      if (!text) throw new Error(`Server returned empty response (HTTP ${res.status}). The request may have timed out.`);
      let d; try { d=JSON.parse(text); } catch(_){ throw new Error(`Invalid response from server: ${text.slice(0,120)}`); }
      if (d.error) throw new Error(d.error);
      setResults(d);
    } catch(e){ setErr(e.message); }
    finally { clearInterval(iv); setStatus(""); setLoading(false); }
  };

  const batch=async()=>{
    if (!filtered.length||!models.length) return;
    setBatch(true); setBp({c:0,t:filtered.length});
    for (let i=0;i<filtered.length;i++){
      setBp(p=>({...p,c:i+1}));
      setPrompt(filtered[i].prompt); setPromptId(filtered[i].id);
      await run(filtered[i].prompt,filtered[i].id);
    }
    setBatch(false);
  };

  return (
    <div>
      <nav className="nav">
        <a className="brand" href="index.html">LeBlanc</a>
        <div className="nav-rule"/>
        <div className="nav-links">
          <a className="nav-a on" href="index.html">Scanner</a>
          <a className="nav-a" href="history.html">History</a>
          <a className="nav-a" href="metrics.html">Metrics</a>
        </div>
      </nav>

      <div className="page">
        <div className="configure">
          <div className="config-row">
            <span className="config-row-label">Category</span>
            {CATS.map(c=>(
              <button key={c} className={`cat-btn ${cat===c?"active":""}`} onClick={()=>setCat(c)}>{c}</button>
            ))}
          </div>

          <div className="config-row" style={{marginBottom:20}}>
            <span className="config-row-label">Models</span>
            {MODELS.map(m=>(
              <button key={m} className={`model-btn ${models.includes(m)?"active":""}`} onClick={()=>toggle(m)}>{m}</button>
            ))}
          </div>

          <div className="prompt-line">
            <select className="prompt-select-inline" value={prompt} onChange={e=>{
              const p=demos.find(d=>d.prompt===e.target.value);
              setPrompt(e.target.value); setPromptId(p?p.id:"custom");
            }}>
              <option value="">Presets…</option>
              {filtered.map(p=><option key={p.id} value={p.prompt}>{p.id}: {p.prompt.slice(0,55)}…</option>)}
            </select>
            <input className="prompt-input-inline" placeholder="Or enter a prompt…" value={prompt} onChange={e=>{
              setPrompt(e.target.value);
              const m=demos.find(p=>p.prompt.trim()===e.target.value.trim());
              setPromptId(m?m.id:"custom");
            }}/>
            <button className="btn-analyze" onClick={()=>run()} disabled={loading||batching||!prompt.trim()||!models.length}>
              {loading?"Analyzing…":"Analyze"}
            </button>
            <button className="btn-batch" onClick={batch} disabled={loading||batching||!filtered.length||!models.length}>
              {batching?`${bp.c}/${bp.t}`:`Batch (${filtered.length})`}
            </button>
          </div>
        </div>

        {batching && (
          <div className="progress-wrap">
            <div className="progress-meta"><span>Batch in progress</span><span>{bp.c} of {bp.t}</span></div>
            <div className="progress-track"><div className="progress-fill" style={{width:`${(bp.c/bp.t)*100}%`}}/></div>
          </div>
        )}

        {loading && (
          <div className="status-line">
            <div className="spin"/>
            <span className="status-txt">{status}</span>
          </div>
        )}

        {err && !loading && <div className="err-line">{err}</div>}

        {results ? (
          <div className="results-grid">
            {models.map(m=><ModelCard key={m} model={m} data={results[m]} tab={tabs[m]||"enriched_repair"} setTab={(mo,t)=>setTabs(p=>({...p,[mo]:t}))}/>)}
          </div>
        ) : !loading && !batching && (
          <div className="empty">
            <span className="empty-word">Ready.</span>
            <p className="empty-sub">Select a category, choose your models, then enter a prompt to begin the analysis pipeline.</p>
          </div>
        )}
      </div>
    </div>
  );
}

function ModelCard({ model, data, tab, setTab }) {
  if (!data) return null;
  const cur = data[tab];
  if (!cur||cur.error) return (
    <div className="mcard">
      <div className="mcard-head">
        <div><div className="mcard-name">{model}</div><div className="mcard-status"><span className="status-dot sd-nil"/><span className="status-label">error</span></div></div>
      </div>
      <div className="mbody" style={{fontSize:13,color:'var(--bad)'}}>{cur?.error||"No data"}</div>
    </div>
  );

  const vulns=cur.scan_results||[];
  const repair=cur.repair_result||{};
  const iters=repair.iterations||[];
  const failed=cur.final_status==="extraction_failed"||(!cur.clean_code&&cur.generated_code);
  const count=cur.vuln_count??vulns.length;

  return (
    <div className="mcard">
      <div className="mcard-head">
        <div>
          <div className="mcard-name">{model}</div>
          <div className="mcard-status"><StatusDot count={count} failed={failed}/></div>
        </div>
      </div>

      <div className="mtabs">
        {[["plain","Plain"],["enriched","Enriched"],["enriched_repair","Repair"]].map(([k,l])=>(
          <div key={k} className={`mtab ${tab===k?"on":""}`} onClick={()=>setTab(model,k)}>{l}</div>
        ))}
      </div>

      <div className="mbody">
        {!failed && vulns.length>0 && (
          <div className="vlist">
            {vulns.map((v,i)=>(
              <div key={i} className="vitem">
                <div className="vrow">
                  <span className="vcwe">{(v.cwes||[]).join(", ")||v.rule}</span>
                  {v.category&&<span className="vcat">— {v.category}</span>}
                </div>
                <div className="vmsg">{v.message}</div>
              </div>
            ))}
          </div>
        )}

        {!failed && vulns.length===0 && (
          <div className="clean-line">
            <span style={{color:'var(--ok)'}}>✓</span> No vulnerabilities detected
          </div>
        )}

        {tab==="enriched_repair" && !failed && (iters.length>0||vulns.length>0) && (
          <div className="repair-section">
            <div className="repair-heading">Repair iterations</div>
            <div className={`repair-row`}>
              <span className="pass-label">init</span>
              <span style={{fontWeight:500,color:'var(--ink)'}}>{vulns.length+(iters[0]?.vulns_before-vulns.length||0)}</span>
              <span style={{fontSize:12,color:'var(--ink-3)'}}>issues found</span>
            </div>
            {iters.map((it,i)=>(
              <div key={i} className={`repair-row ${it.vulns_after===0?"pass-clean":""}`}>
                <span className="pass-label">pass {it.iteration}</span>
                <span style={{color:'var(--ink)'}}>{it.vulns_before}</span>
                <span className="pass-arrow">→</span>
                <span style={{color: it.vulns_after===0?'var(--ok)':'var(--ink)'}}>{it.vulns_after}</span>
              </div>
            ))}
            {cur.final_status==="clean"
              ? <div className="repair-verdict rv-ok">All issues resolved</div>
              : iters.length>0&&<div className="repair-verdict rv-warn">Halted — {cur.total_iterations} iterations</div>
            }
          </div>
        )}

        <div className="code-head">
          <span className="code-lbl">Output</span>
        </div>
        <div className="code-block">{repair.final_code||cur.clean_code||cur.generated_code||"—"}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
